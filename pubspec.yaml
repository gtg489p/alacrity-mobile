name: alacrity_mobile
description: Alacrity Plant Manager — Production Scheduling Dashboard
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # ── Networking ────────────────────────────────────────────
  dio: ^5.7.0
  dio_smart_retry: ^7.0.0
  connectivity_plus: ^6.1.0

  # ── Navigation ────────────────────────────────────────────
  go_router: ^14.6.0

  # ── Charts ────────────────────────────────────────────────
  fl_chart: ^0.70.0

  # ── Local Storage ─────────────────────────────────────────
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.3.0

  # ── Models / Serialization ────────────────────────────────
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # ── UI Utilities ──────────────────────────────────────────
  intl: ^0.19.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ───────────────────────────────────────
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

  # ── Linting ───────────────────────────────────────────────
  very_good_analysis: ^6.0.0

  # ── Testing ───────────────────────────────────────────────
  mocktail: ^1.0.0

  # ── App Assets ────────────────────────────────────────────
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#09090B"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
